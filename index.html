<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A quiet journey, discovered one small step at a time." />
  <title>a quiet room</title>

  <!-- ============================================================= -->
  <!--  If you are reading this, you already know how to look.       -->
  <!--  Some rooms keep their windows painted over on purpose.       -->
  <!--  Nothing here needs code, or the internet, or another person. -->
  <!--  Only patience, and the willingness to stay a little longer.  -->
  <!-- ============================================================= -->

  <link rel="stylesheet" href="style.css" />
</head>
<body data-stage="0">

  <!-- Ambient drifting particles live here -->
  <canvas id="particles" aria-hidden="true"></canvas>

  <!-- Soft vignette / atmosphere overlay -->
  <div id="atmosphere" aria-hidden="true"></div>

  <!-- Top bar: progress + gentle controls -->
  <header id="topbar">
    <div id="progress-wrap" title="how far you have come">
      <div id="progress-bar"><span id="progress-fill"></span></div>
      <div id="progress-label">0 / 0</div>
    </div>
    <div id="controls">
      <!-- Ambient audio is optional. Drop assets/ambient.mp3 to enable it. -->
      <button id="audio-toggle" class="ghost-btn" aria-label="toggle sound" title="ambient sound">♪ on</button>
      <button id="restart-top" class="ghost-btn" aria-label="restart journey" title="start over">↺</button>
    </div>
  </header>

  <!-- Every challenge is mounted here, one at a time -->
  <main id="stage" role="main"></main>

  <!-- The collected sentences quietly gather here -->
  <aside id="journal" aria-label="what you have found">
    <button id="journal-toggle" class="ghost-btn" title="what you have gathered">✦</button>
    <div id="journal-panel">
      <h3>what remains</h3>
      <ul id="journal-list"></ul>
    </div>
  </aside>

  <footer id="footer"><span>&nbsp;</span></footer>

  <!-- Optional ambient audio element. Silent until you add the file. -->
  <audio id="ambient" loop preload="auto">
    <source src="assets/ambient.mp3" type="audio/mpeg" />
  </audio>

  <!--  the bottle was full, once.  -->

  <!-- Challenge definitions load first, then the engine that drives them -->
  <script src="challenges/challenges.js"></script>
  <script src="script.js"></script>
</body>
</html>
